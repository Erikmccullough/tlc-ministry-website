<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TLC Community Listening Project</title>
  <meta name="description" content="Help shape future TLC Ministry programs for community connection, creativity, service, education, AI literacy, and human support." />

  <meta property="og:title" content="TLC Community Listening Project" />
  <meta property="og:description" content="Take the 3-5 minute survey and help shape future TLC programs." />
  <meta property="og:type" content="website" />

  <meta http-equiv="refresh" content="2; url=https://docs.google.com/forms/d/e/1FAIpQLSe0VAcogH4-XTogcxxnMzFNKPuG_8vqfBrvwpuZyML9xcVV7g/viewform?usp=dialog" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 680px;
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 18px;
      padding: 36px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      line-height: 1.6;
      color: #ddd;
    }

    a.button {
      display: inline-block;
      margin-top: 18px;
      padding: 14px 22px;
      border-radius: 999px;
      background: #f2b705;
      color: #111;
      text-decoration: none;
      font-weight: bold;
    }

    .small {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>TLC Community Listening Project</h1>

    <p>
      Thank you for helping shape the future of TLC Ministry –
      Tacos, Love & Creation Foundation.
    </p>

    <p>
      You’ll be redirected to our short community survey in just a moment.
    </p>

    <a class="button" href="https://docs.google.com/forms/d/e/1FAIpQLSe0VAcogH4-XTogcxxnMzFNKPuG_8vqfBrvwpuZyML9xcVV7g/viewform?usp=dialog">
      Open the Survey
    </a>

    <p class="small">
      If nothing happens, tap the button above.
    </p>
  </main>
</body>
</html>
