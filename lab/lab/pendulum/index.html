<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TLC Double Pendulum Lab</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#020814;color:#9ff;font-family:Arial}
canvas{display:block;width:100vw;height:100vh}
.panel{position:fixed;left:14px;right:14px;bottom:14px;padding:14px;border:1px solid #0ff;border-radius:18px;background:rgba(0,20,35,.78);box-shadow:0 0 25px #00e5ff88}
button{width:48%;padding:14px;margin:4px 1%;border-radius:14px;border:1px solid #0ff;background:#063647;color:white;font-size:18px;font-weight:bold}
h1{font-size:22px;letter-spacing:5px;margin:0 0 8px;text-shadow:0 0 15px #0ff}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="panel">
<h1>TLC DOUBLE PENDULUM LAB</h1>
<p>Two linked glowing masses. Kick it and let chaos flirt with geometry.</p>
<button onclick="kick()">Kick</button><button onclick="reset()">Reset</button>
</div>
<script>
const c=document.getElementById("c"),x=c.getContext("2d");
let W,H,cx,cy,R;
let a1=1.35,a2=1.9,v1=0,v2=0;
let m1=1,m2=1,L1=145,L2=125,g=.7,d=.997;
let trail=[];

function size(){
  W=c.width=innerWidth*devicePixelRatio;
  H=c.height=innerHeight*devicePixelRatio;
  x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  cx=innerWidth/2;
  cy=innerHeight*.32;
  R=Math.min(innerWidth,innerHeight)*.32;
}
addEventListener("resize",size);size();

function reset(){a1=1.35;a2=1.9;v1=0;v2=0;trail=[]}
function kick(){v1+=(Math.random()-.5)*.3;v2+=(Math.random()-.5)*.4}

function physics(){
  let n1=-g*(2*m1+m2)*Math.sin(a1);
  let n2=-m2*g*Math.sin(a1-2*a2);
  let n3=-2*Math.sin(a1-a2)*m2*(v2*v2*L2+v1*v1*L1*Math.cos(a1-a2));
  let den=L1*(2*m1+m2-m2*Math.cos(2*a1-2*a2));
  let acc1=(n1+n2+n3)/den;

  let n4=2*Math.sin(a1-a2);
  let n5=v1*v1*L1*(m1+m2);
  let n6=g*(m1+m2)*Math.cos(a1);
  let n7=v2*v2*L2*m2*Math.cos(a1-a2);
  let den2=L2*(2*m1+m2-m2*Math.cos(2*a1-2*a2));
  let acc2=n4*(n5+n6+n7)/den2;

  v1=(v1+acc1)*d;
  v2=(v2+acc2)*d;
  a1+=v1;
  a2+=v2;
}

function project(px,py){
  let scale=.72+.28*Math.cos((px-cx)/300);
  return [px, cy+(py-cy)*.58*scale];
}

function drawDome(){
  x.strokeStyle="#00e5ff55";x.lineWidth=2;
  for(let i=0;i<10;i++){
    x.beginPath();
    x.ellipse(cx,cy,R*(1-i*.055),R*.45*(1-i*.055),0,Math.PI,Math.PI*2);
    x.stroke();
  }
  for(let i=-5;i<=5;i++){
    x.beginPath();
    x.ellipse(cx,cy,R*.18,R*.45,i*.19,Math.PI,Math.PI*2);
    x.stroke();
  }
}

function orb(px,py,r,color){
  x.shadowBlur=30;x.shadowColor=color;
  x.fillStyle="#fff";
  x.beginPath();x.arc(px,py,r,0,Math.PI*2);x.fill();
  x.fillStyle=color;
  x.beginPath();x.arc(px,py,r*.48,0,Math.PI*2);x.fill();
  x.shadowBlur=0;
}

function frame(){
  requestAnimationFrame(frame);
  physics();

  let x1=cx+L1*Math.sin(a1);
  let y1=cy+L1*Math.cos(a1);
  let x2=x1+L2*Math.sin(a2);
  let y2=y1+L2*Math.cos(a2);

  let p0=[cx,cy],p1=project(x1,y1),p2=project(x2,y2);
  trail.push(p2);
  if(trail.length>260)trail.shift();

  x.clearRect(0,0,innerWidth,innerHeight);
  let bg=x.createRadialGradient(cx,cy,10,cx,cy,R*2.7);
  bg.addColorStop(0,"#06244a");bg.addColorStop(1,"#010711");
  x.fillStyle=bg;x.fillRect(0,0,innerWidth,innerHeight);

  x.fillStyle="#9ff";x.font="18px Arial";
  x.fillText("Hemisphere double pendulum prototype",24,38);

  drawDome();

  x.lineWidth=2;
  for(let i=1;i<trail.length;i++){
    let q0=trail[i-1],q1=trail[i];
    x.strokeStyle=`rgba(0,229,255,${i/trail.length*.55})`;
    x.beginPath();x.moveTo(q0[0],q0[1]);x.lineTo(q1[0],q1[1]);x.stroke();
  }

  x.strokeStyle="#00ffff";x.lineWidth=5;x.shadowBlur=20;x.shadowColor="#00ffff";
  x.beginPath();x.moveTo(p0[0],p0[1]);x.lineTo(p1[0],p1[1]);x.lineTo(p2[0],p2[1]);x.stroke();
  x.shadowBlur=0;

  orb(p1[0],p1[1],17,"#00e5ff");
  orb(p2[0],p2[1],21,"#ff35ff");
}
frame();
</script>
</body>
</html>
