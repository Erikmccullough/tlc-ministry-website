<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TLC Community Survey</title>
  <meta name="description" content="Help shape future TLC Ministry programs for community connection, creativity, service, education, and AI literacy." />
  <link href="https://api.fontshare.com/v2/css?f[]=zodiak@400,500,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    body{margin:0;background:#f7f2ea;color:#1e1b18;font:16px/1.6 'Satoshi',Arial,sans-serif}
    .wrap{width:min(980px,calc(100% - 24px));margin:40px auto}
    .card{background:#fffdfa;border:1px solid rgba(30,27,24,.12);border-radius:28px;padding:28px;box-shadow:0 18px 48px rgba(30,27,24,.10)}
    h1,h2{font-family:'Zodiak',Georgia,serif;line-height:1.05}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .full{grid-column:1/-1}
    label{display:block;margin:14px 0 6px;font-weight:700}
    input,select,textarea{width:100%;padding:14px 16px;border-radius:16px;border:1px solid rgba(30,27,24,.12);background:#fff}
    textarea{min-height:120px}
    button,.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:13px 18px;border-radius:999px;border:0;background:#0f6b6f;color:#fff;font-weight:700;text-decoration:none}
    .muted{color:#655d53}
    .status{margin-top:12px;min-height:24px}
    @media(max-width:760px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="btn" href="../index.html" style="background:#c1502e">← Back to TLC Ministry</a>
    <div class="card">
      <h1>TLC Community Survey</h1>
      <p class="muted">This survey mirrors the exact structure of the original Google Form export so historical responses and new website submissions can live in one sheet.</p>

      <form id="surveyForm" class="grid">
        <div>
          <label>Name (Optional)</label>
          <input name="name">
        </div>
        <div>
          <label>Email Address (Optional)</label>
          <input type="email" name="email">
        </div>
        <div>
          <label>Would you like to receive updates from TLC?</label>
          <select name="updates"><option>Yes</option><option>No</option></select>
        </div>
        <div>
          <label>Which best describes you?</label>
          <input name="describes" placeholder="Community Member; Artist / Creative; Parent">
        </div>
        <div class="full">
          <label>Which TLC programs interest you?</label>
          <textarea name="programs" placeholder="Separate multiple selections with semicolons"></textarea>
        </div>
        <div class="full">
          <label>How would you most likely participate?</label>
          <textarea name="participate"></textarea>
        </div>
        <div class="full">
          <label>What skills could you contribute?</label>
          <textarea name="skills"></textarea>
        </div>
        <div class="full">
          <label>Which community challenges concern you most?</label>
          <textarea name="challenges"></textarea>
        </div>
        <div>
          <label>How concerned are you about the impact of AI on jobs, education, and daily life? (1-5)</label>
          <select name="ai_concern"><option value=""></option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
        </div>
        <div>
          <label>Would you attend a free workshop about AI tools and the future of work?</label>
          <select name="ai_workshop"><option>Yes</option><option>Maybe</option><option>No</option></select>
        </div>
        <div class="full">
          <label>What AI-related topics interest you most?</label>
          <textarea name="ai_topics"></textarea>
        </div>
        <div class="full">
          <label>What is the biggest challenge facing our community today?</label>
          <textarea name="biggest_challenge"></textarea>
        </div>
        <div class="full">
          <label>If TLC could launch one new program tomorrow, what should it be?</label>
          <textarea name="new_program"></textarea>
        </div>
        <div>
          <label>Would you be willing to participate in a future focus group or interview?</label>
          <select name="focus_group"><option>Yes</option><option>No</option></select>
        </div>
        <div>
          <label>How interested would you be in attending free workshops related to AI, technology, creativity, entrepreneurship, or future job skills? (1-5)</label>
          <select name="workshop_interest"><option value=""></option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
        </div>
        <div class="full">
          <label>Anything else you'd like us to know?</label>
          <textarea name="anything_else"></textarea>
        </div>
        <div class="full">
          <button type="submit">Submit survey</button>
          <p class="status" id="status"></p>
        </div>
      </form>
    </div>
  </div>
  <script>
    const ENDPOINT = 'https://script.google.com/macros/s/AKfycbyKWDD0DgOvhmANDM9e2-ir-bdvG5zRQQE0MjEsRJetHwaeQH5WiSp_SwwRHs3Fkv00Qw/exec';
    const form = document.getElementById('surveyForm');
    const statusEl = document.getElementById('status');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.textContent = 'Submitting...';
      const data = Object.fromEntries(new FormData(form).entries());
      data['Timestamp'] = new Date().toISOString();
      try {
        const res = await fetch(ENDPOINT, {
          method: 'POST',
          body: new URLSearchParams(data)
        });
        const out = await res.json().catch(() => ({}));
        if (res.ok && (out.result === 'success' || out.ok)) {
          statusEl.textContent = 'Thank you - your response was saved!';
          form.reset();
        } else {
          statusEl.textContent = 'Submission failed. Please try again.';
        }
      } catch (err) {
        statusEl.textContent = 'Submission failed. Please try again. (' + err.message + ')';
      }
    });
  </script>
</body>
</html>
